name: Secret scanning

on:
  pull_request:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out full history
        uses: actions/checkout@de0fac2e4500dabe0009eec74e221dc2cebe01f2 # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan changed commits for credentials
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --results=verified,unknown --fail --fail-on-scan-errors
