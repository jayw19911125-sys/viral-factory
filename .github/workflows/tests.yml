name: Data quality tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile core modules
        run: >-
          python -m py_compile
          data_quality.py execution_tracker.py management_report.py ack_collector.py
          script_scorer.py script_distributor.py trending_fetcher.py
          viral_factory.py weekly_report.py daily_run.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
