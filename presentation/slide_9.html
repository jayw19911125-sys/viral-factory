<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #F8F9FA; 
            position: relative;
            padding-top: 50px;
            overflow: hidden;
        }
        
        .slide-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(33, 37, 41, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(33, 37, 41, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 1;
            margin: 0 60px 30px;
            border-bottom: 4px solid #212529;
        }

        .page-title {
            color: #212529;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .page-title span { color: #F72585; }

        .content-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 5fr 7fr;
            gap: 8px; /* reduced vertical gap to save height */
            margin: 0 60px;
        }

        .card {
            border: 1px solid #212529;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 16px; /* slightly reduced */
            font-size: 24px;
            font-weight: 800;
            border-bottom: 1px solid #212529;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .before-card {
            background: #E9ECEF;
        }

        .before-card .card-header {
            background: #6C757D;
            color: white;
        }

        .after-card {
            background: white;
            box-shadow: 8px 8px 0px #4361EE;
        }

        .after-card .card-header {
            background: #4361EE;
            color: white;
        }

        .card-body {
            padding: 12px; /* reduced padding to shrink height */
            flex: 1;
        }

        .before-list {
            list-style: none;
        }

        .before-list li {
            font-size: 18px;
            color: #495057;
            margin-bottom: 12px; /* reduced spacing between points */
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.5;
        }

        .before-list li i {
            color: #DC3545;
            margin-top: 4px;
        }

        .step-list {
            display: flex;
            flex-direction: column;
            gap: 12px; /* slightly tighter */
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #F8F9FA;
            border: 1px solid #212529;
            padding: 12px 20px;
        }

        .step-num {
            background: #F72585;
            color: white;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 18px;
            font-weight: 800;
            color: #212529;
        }

        .step-text span {
            color: #4361EE;
            font-weight: 400;
            font-size: 16px;
            margin-left: 8px;
        }

        .summary-card {
            grid-column: 1 / 3;
            background: #212529;
            color: white;
            border: 1px solid #212529;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-top: 0; /* removed extra margin to save vertical space */
        }

        .summary-label {
            background: #F72585;
            color: white;
            padding: 8px 16px;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .summary-text {
            font-size: 24px;
            font-weight: 800;
        }

        .summary-text span {
            color: #4361EE;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="page-title"><span>08 /</span> 系統每天幫阿韋準備好「今天可以參考什麼」</h2>
        </div>

        <div class="content-grid">
            <!-- Before -->
            <div class="card before-card">
                <div class="card-header">
                    <i class="fas fa-times-circle"></i> 以前（沒有系統）
                </div>
                <div class="card-body">
                    <ul class="before-list">
                        <li><i class="fas fa-exclamation-triangle"></i> <div><strong>自己翻 TikTok 找靈感</strong><br>每天耗時 30-60 分鐘在滑手機</div></li>
                        <li><i class="fas fa-exclamation-triangle"></i> <div><strong>靈感來源不穩定</strong><br>有時候找半天也找不到好的參考</div></li>
                        <li><i class="fas fa-exclamation-triangle"></i> <div><strong>好素材沒有記錄</strong><br>看過的好影片下次要找又要重來</div></li>
                    </ul>
                </div>
            </div>

            <!-- After -->
            <div class="card after-card">
                <div class="card-header">
                    <i class="fas fa-check-circle"></i> 現在（有系統）
                </div>
                <div class="card-body">
                    <div class="step-list">
                        <div class="step-item">
                            <div class="step-num">1</div>
                            <div class="step-text">早上打開 Slack <span>#自動化訊息來源 頻道</span></div>
                        </div>
                        <div class="step-item">
                            <div class="step-num">2</div>
                            <div class="step-text">看今天入庫的 5 支影片通知</div>
                        </div>
                        <div class="step-item">
                            <div class="step-num">3</div>
                            <div class="step-text">點進 Notion 03 庫 <span>找對應的開頭鉤子公式</span></div>
                        </div>
                        <div class="step-item">
                            <div class="step-num">4</div>
                            <div class="step-text">點進 Notion 06 庫 <span>找拍攝視覺錘參考</span></div>
                        </div>
                        <div class="step-item" style="background: rgba(67, 97, 238, 0.1); border-color: #4361EE;">
                            <div class="step-num" style="background: #4361EE;">5</div>
                            <div class="step-text" style="color: #4361EE;">開始拍攝，有根據、有方向！</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Summary -->
            <div class="summary-card">
                <div class="summary-label">核心改變</div>
                <div class="summary-text">從「找靈感」變成「選素材」，效率提升 <span>3-5 倍</span></div>
            </div>
        </div>
    </div>
</body>
</html>
