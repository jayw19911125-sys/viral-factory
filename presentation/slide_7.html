<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', sans-serif; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #F8F9FA; 
            position: relative;
            padding-top: 50px;
            overflow: hidden;
        }
        
        .slide-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(33, 37, 41, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(33, 37, 41, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 1;
            margin: 0 60px 40px;
            border-bottom: 4px solid #212529;
        }

        .page-title {
            color: #212529;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .page-title span { color: #F72585; }

        .content-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin: 0 60px;
        }

        .db-card {
            background: white;
            border: 1px solid #212529;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .db-card.db-02 {
            box-shadow: 8px 8px 0px #212529;
        }

        .db-card.db-35 {
            box-shadow: 8px 8px 0px #F72585;
            border-color: #F72585;
            border-width: 2px;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid #212529;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .db-02 .card-header { background: #212529; color: white; }
        .db-35 .card-header { background: #F72585; color: white; border-bottom-color: #F72585; }

        .db-number {
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
        }

        .db-title {
            font-size: 28px;
            font-weight: 800;
        }

        .card-body {
            padding: 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .info-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            border-bottom: 1px solid #212529;
        }

        .db-35 .info-row { border-bottom-color: rgba(247, 37, 133, 0.2); }

        .info-row:last-child {
            border-bottom: none;
            flex: 1;
        }

        .info-label {
            background: #F8F9FA;
            padding: 24px;
            font-weight: 800;
            color: #495057;
            border-right: 1px solid #212529;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .db-35 .info-label { 
            background: rgba(247, 37, 133, 0.05); 
            border-right-color: rgba(247, 37, 133, 0.2);
            color: #F72585;
        }

        .info-content {
            padding: 24px;
            font-size: 20px;
            color: #212529;
            display: flex;
            align-items: center;
            line-height: 1.5;
        }

        .db-35 .info-content { font-weight: 800; }

    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="page-title"><span>06 /</span> 素材不是存著看的，是用來創作的 (1/2)</h2>
        </div>

        <div class="content-grid">
            <!-- 02 Database -->
            <div class="db-card db-02">
                <div class="card-header">
                    <div class="db-number">02</div>
                    <div class="db-title">爆款拆解庫</div>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-database"></i> 存什麼</div>
                        <div class="info-content">每日拆解的完整原始記錄 (1-5分全收錄)</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-user"></i> 誰最常用</div>
                        <div class="info-content">子權</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-clock"></i> 什麼時候用</div>
                        <div class="info-content">系統運作監控、週報查閱與數據分析時</div>
                    </div>
                </div>
            </div>

            <!-- 35 Database -->
            <div class="db-card db-35">
                <div class="card-header">
                    <div class="db-number">35</div>
                    <div class="db-title">已驗證腳本庫</div>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-star"></i> 存什麼</div>
                        <div class="info-content">4-5 分的高分腳本 (精華中的精華)</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-users"></i> 誰最常用</div>
                        <div class="info-content">全體團隊成員</div>
                    </div>
                    <div class="info-row">
                        <div class="info-label"><i class="fas fa-bolt"></i> 什麼時候用</div>
                        <div class="info-content">需要快速產出高轉換影片，直接找對標複用時</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
